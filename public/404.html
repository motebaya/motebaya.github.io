<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      var l = window.location;

      if (l.pathname.startsWith("/imagegen")) {
        window.location.replace(
          l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") + "/imagegen/",
        );
      } else {
        var pathSegmentsToKeep = 0;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash,
        );
      }
    </script>
  </head>
  <body></body>
</html>
